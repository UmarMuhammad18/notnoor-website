<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N0tN0Or Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
<div class="login-box">
  <div class="login-logo">N0tN0Or 👑</div>
  <div class="login-sub">Owner Dashboard · Secure Login</div>
  <div class="login-form">
    <div><label>Username</label><input type="text" id="loginUser" placeholder="Enter username" autocomplete="username"></div>
    <div><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="loginErr">Incorrect username or password.</div>
    <button class="login-btn" onclick="doLogin()">Access Dashboard →</button>
  </div>
  <a class="login-back" href="index.html">← Back to Website</a>
</div>
<script>window.CURRENT_PAGE = "login";</script>
<script src="main.js"></script>
</body>
</html>
